
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>年額会員 ログイン (デモ)</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #111; color: #fff; font-family: "Noto Sans JP", sans-serif; }
        .login-box { background: linear-gradient(145deg, rgba(212,175,55,0.1), rgba(0,0,0,0.8)); padding: 40px; border-radius: 12px; text-align: center; border: 1px solid rgba(212,175,55,0.4); width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(212,175,55,0.1); }
        h1 { font-family: "Cormorant Garamond", serif; color: #d4af37; margin-bottom: 10px; }
        p { color: #ccc; margin-bottom: 30px; font-size: 0.9rem; }
        button { background: linear-gradient(45deg, #d4af37, #f3e5ab); color: #111; border: none; padding: 15px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; font-size: 1rem; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212,175,55,0.3); }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Premier Member</h1>
        <p>年額会員（10,000円/年）としてログインします。<br>プレミア限定コンテンツが表示されます。</p>
        <button onclick="login()">プレミア会員として入室</button>
    </div>
    <script>
        function login() {
            localStorage.setItem("lala_fc_tier", "premier");
            window.location.href = "fanclub-dashboard.html";
        }
    </script>
</body>
</html>
