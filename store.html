<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lala Online Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .subpage-header { padding: 20px 40px; position: absolute; top: 0; left: 0; width: 100%; z-index: 100; }
        .back-btn { color: #fff; font-size: 0.9rem; letter-spacing: 0.1em; opacity: 0.8; }
        .back-btn:hover { opacity: 1; color: var(--primary-color); }
        .subpage-hero { height: 40vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(to bottom, rgba(8,16,23,0.3), var(--bg-color));}
        .content-area { padding: 60px 0 100px; }
        .store-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 30px; margin-top: 40px;}
        .store-item { background: var(--surface-color); border: var(--glass-border); border-radius: 8px; overflow: hidden; text-align: center; transition: all 0.3s;}
        .store-item:hover { transform: translateY(-5px); border-color: var(--primary-color);}
        .item-image { width: 100%; aspect-ratio: 1/1; background: #151d26; display: flex; align-items: center; justify-content: center; color: var(--text-muted);}
        .item-image img { width: 100%; height: 100%; object-fit: cover; }
        .item-info { padding: 20px; }
        .item-title { font-size: 1.1rem; margin-bottom: 10px; }
        .item-price { color: var(--primary-color); font-weight: bold; margin-bottom: 15px;}
    </style>
</head>
<body>
    <header class="subpage-header">
        <a href="index.html" class="back-btn">← Back to Home</a>
    </header>

    <div class="subpage-hero fade-in">
        <h1 class="hero-title" style="font-size: 3rem;">Online Store</h1>
    </div>

    <section class="content-area fade-in-up delay-1">
        <div class="container">
            <div class="store-grid">
                
                <!-- 商品１ -->
                <div class="store-item fade-in-up">
                    <div class="item-image" style="background: none;">
                        <img src="images/二千十五年九月一日.png" alt="lala謹製御朱印" style="width: 100%; height: 100%; object-fit: contain;">
                    </div>
                    <div class="item-info">
                        <h3 class="item-title">lala謹製御朱印</h3>
                        <p class="item-price">¥500</p>
                        <a href="store-goshuin.html" class="btn outline-btn" style="padding: 8px 20px; font-size: 0.8rem;">詳細を見る</a>
                    </div>
                </div>

                <!-- 商品２ -->
                <div class="store-item fade-in-up delay-1">
                    <div class="item-image">
                        <span>Image</span>
                    </div>
                    <div class="item-info">
                        <h3 class="item-title">lala ロゴステッカーセット</h3>
                        <p class="item-price">¥1,000</p>
                        <a href="#" class="btn outline-btn" style="padding: 8px 20px; font-size: 0.8rem;">詳細を見る</a>
                    </div>
                </div>

                <!-- 商品３ -->
                <div class="store-item fade-in-up delay-2">
                    <div class="item-image" style="background: none;">
                        <img src="images/lalaロゴ名刺入れ.jpg" alt="Shara謹製lalaレザー名刺入れ" style="width: 100%; height: 100%; object-fit: contain;">
                    </div>
                    <div class="item-info">
                        <h3 class="item-title">Shara謹製lalaレザー名刺入れ</h3>
                        <p class="item-price">¥15,000</p>
                        <a href="store-cardcase.html" class="btn outline-btn" style="padding: 8px 20px; font-size: 0.8rem;">詳細を見る</a>
                    </div>
                </div>

                <!-- 商品４ -->
                <div class="store-item fade-in-up delay-3">
                    <div class="item-image" style="background: none;">
                        <img src="images/lala_keychain.png" alt="lala刻印入りキーホルダー" style="width: 100%; height: 100%; object-fit: contain;">
                    </div>
                    <div class="item-info">
                        <h3 class="item-title">lala刻印入りキーホルダー</h3>
                        <p class="item-price">¥3,000</p>
                        <a href="store-keychain.html" class="btn outline-btn" style="padding: 8px 20px; font-size: 0.8rem;">詳細を見る</a>
                    </div>
                </div>

                <!-- 商品５（Coming Soon） -->
                <div class="store-item fade-in-up delay-3">
                    <div class="item-image text-center" style="padding: 40px; font-size: 0.8rem;">
                        <span style="color: var(--primary-color); font-size: 1.2rem; letter-spacing: 0.1em;">COMING SOON</span>
                        <div class="mt-4">Next Collection</div>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const faders = document.querySelectorAll('.fade-in, .fade-in-up');
            setTimeout(() => {
                faders.forEach(fader => fader.classList.add('appear'));
            }, 100);
        });
    </script>
</body>
</html>
